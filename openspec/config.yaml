# openspec/config.yaml — SDD project config for cyberpunk-plugin
schema: spec-driven

context: |
  Tech stack: Bun 1.3.12 + TypeScript (strict mode), standalone CLI binary
  Architecture: Command-dispatch CLI (install/upgrade/config/status/tui)
  Components: plugin, theme, sounds, context-mode, rtk (independent install/uninstall)
  Build: bun build --compile ./src/index.ts → standalone binary
  Config: ~/.config/cyberpunk/config.json (JSON schema)
  Specs: 7 domains — install, upgrade, config, tui, plugin-registration, sound-events, ctx-stats

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  # Strict TDD Mode: disabled (no test script in package.json; enable by adding "test": "bun test")
  test_runner:
    command: bun test
    framework: bun:test
  test_layers:
    unit:
      available: true
      tool: bun:test
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: true
    command: bun test --coverage
  quality_tools:
    linter:
      available: false
      command: null
    type_checker:
      available: true
      command: bun run tsc --noEmit
    formatter:
      available: false
      command: null
