schema: spec-driven

context: |
  Tech stack: Bun + TypeScript (strict), standalone TypeScript CLI
  Architecture: modular command dispatch (install/upgrade/config/status/tui) with component adapters and plugin registration
  Domain boundaries: installer/doctor/upgrade flows, tmux/sound/theme setup, OpenCode integration, telemetry, codebase-memory
  Testing: `bun test` with `tests/` as the unit test suite (multiple test files) using `bun:test`
  Build: `bun build --compile ./src/index.ts` (or `bun run build`) to produce `cyberpunk`
  Quality: CI runs `bun test` and `bun run typecheck`
  Style: strict TypeScript, compact command modules, marker-based file writes for idempotence
  Config/assets: root `package.json`, `tsconfig.json`, `README.md` + install/binary scripts

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  test_runner:
    command: bun test
    framework: bun:test
  test_layers:
    unit:
      available: true
      tool: bun:test
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: true
    command: bun test --coverage
  quality_tools:
    linter:
      available: false
      command: null
    type_checker:
      available: true
      command: bun run typecheck
    formatter:
      available: false
      command: null
