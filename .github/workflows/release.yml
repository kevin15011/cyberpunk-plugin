name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      should_release: ${{ steps.resolve.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            tag="${{ github.event.inputs.version }}"
          else
            tag="v$(node -p 'require("./package.json").version')"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            should_release="false"
            echo "Release tag already exists: $tag"
          else
            should_release="true"
            echo "New release tag detected: $tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

  build:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun run build
          mv ./cyberpunk ./cyberpunk-linux-x64
          chmod +x ./cyberpunk-linux-x64

      - name: Smoke test binary
        run: ./cyberpunk-linux-x64 help

      - name: Generate checksum fragment
        run: sha256sum ./cyberpunk-linux-x64 >> checksums.txt

      - name: Upload checksum fragment
        uses: actions/upload-artifact@v4
        with:
          name: checksums-linux-x64
          path: ./checksums.txt

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./cyberpunk-linux-x64
          artifactContentType: application/octet-stream
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    needs:
      - resolve-tag
      - build
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary for Linux arm64
        run: |
          bun build --compile ./src/index.ts --outfile ./cyberpunk-linux-arm64
          chmod +x ./cyberpunk-linux-arm64

      - name: Smoke test binary
        run: ./cyberpunk-linux-arm64 help

      - name: Generate checksum fragment
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ./cyberpunk-linux-arm64 >> checksums.txt
          else
            shasum -a 256 ./cyberpunk-linux-arm64 >> checksums.txt
          fi

      - name: Upload checksum fragment
        uses: actions/upload-artifact@v4
        with:
          name: checksums-linux-arm64
          path: ./checksums.txt

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./cyberpunk-linux-arm64
          artifactContentType: application/octet-stream
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-darwin-arm64:
    needs:
      - resolve-tag
      - build
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary for macOS arm64
        run: |
          bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile ./cyberpunk-darwin-arm64
          chmod +x ./cyberpunk-darwin-arm64

      - name: Smoke test binary
        run: ./cyberpunk-darwin-arm64 help

      - name: Generate checksum fragment
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ./cyberpunk-darwin-arm64 >> checksums.txt
          else
            shasum -a 256 ./cyberpunk-darwin-arm64 >> checksums.txt
          fi

      - name: Upload checksum fragment
        uses: actions/upload-artifact@v4
        with:
          name: checksums-darwin-arm64
          path: ./checksums.txt

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./cyberpunk-darwin-arm64
          artifactContentType: application/octet-stream
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    needs:
      - resolve-tag
      - build
      - build-linux-arm64
      - build-darwin-arm64
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download checksum fragments
        uses: actions/download-artifact@v5
        with:
          pattern: checksums-*
          path: ./checksums

      - name: Combine checksum fragments
        shell: bash
        run: |
          shopt -s globstar
          cat ./checksums/**/*.txt > ./checksums.txt

      - name: Upload checksum manifest
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./checksums.txt
          artifactContentType: text/plain
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
