name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      should_release: ${{ steps.resolve.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            tag="${{ github.event.inputs.version }}"
          else
            tag="v$(node -p 'require("./package.json").version')"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            should_release="false"
            echo "Release tag already exists: $tag"
          else
            should_release="true"
            echo "New release tag detected: $tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

  build:
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          bun run build
          mv ./cyberpunk ./cyberpunk-linux-x64
          chmod +x ./cyberpunk-linux-x64

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./cyberpunk-linux-x64
          artifactContentType: application/octet-stream
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-arm64:
    needs:
      - resolve-tag
      - build
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary for Linux arm64
        run: |
          bun build --compile ./src/index.ts --outfile ./cyberpunk-linux-arm64
          chmod +x ./cyberpunk-linux-arm64

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./cyberpunk-linux-arm64
          artifactContentType: application/octet-stream
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-darwin-x64:
    needs:
      - resolve-tag
      - build
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary for macOS x64
        run: |
          bun build --compile --target=bun-darwin-x64 ./src/index.ts --outfile ./cyberpunk-darwin-x64
          chmod +x ./cyberpunk-darwin-x64

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./cyberpunk-darwin-x64
          artifactContentType: application/octet-stream
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-darwin-arm64:
    needs:
      - resolve-tag
      - build
    if: needs.resolve-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary for macOS arm64
        run: |
          bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile ./cyberpunk-darwin-arm64
          chmod +x ./cyberpunk-darwin-arm64

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-tag.outputs.tag }}
          commit: ${{ github.sha }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: ./cyberpunk-darwin-arm64
          artifactContentType: application/octet-stream
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
